name: Validate

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch:

jobs:
  validate-package:
    name: Validate Package (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x', '24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Configure Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install project dependencies
        run: npm install

      - name: Pull stacks-pix-sdk from registry
        run: npm install stacks-pix-sdk --no-save

      - name: Typecheck
        continue-on-error: true
        run: npm run typecheck --if-present

      - name: Lint
        continue-on-error: true
        run: npm run lint --if-present

      - name: Test
        continue-on-error: true
        run: npm test --if-present

      - name: Build
        continue-on-error: true
        run: npm run build --if-present

      - name: Validate SDK require
        continue-on-error: true
        run: node -e "require('stacks-pix-sdk'); console.log('stacks-pix-sdk validated on Node', process.version);"
