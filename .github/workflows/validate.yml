name: Validate

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  verify:
    name: Verify stacks-pix-sdk from npm
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare clean environment
        run: mkdir -p /tmp/stacks-pix-sdk-check

      - name: Initialize project
        working-directory: /tmp/stacks-pix-sdk-check
        run: npm init -y

      - name: Install stacks-pix-sdk from registry
        working-directory: /tmp/stacks-pix-sdk-check
        run: npm install stacks-pix-sdk

      - name: Verify module loads
        working-directory: /tmp/stacks-pix-sdk-check
        run: node -e "const sdk = require('stacks-pix-sdk'); console.log('stacks-pix-sdk OK, exports:', Object.keys(sdk));"

      - name: Show dependency tree
        working-directory: /tmp/stacks-pix-sdk-check
        run: npm ls --all
