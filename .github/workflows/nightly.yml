name: Package Health Monitor

on:
  schedule:
    - cron: '35 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Package Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install project deps
        run: npm ci

      - name: Run test suite
        continue-on-error: true
        run: npm test

      - name: Build from source
        continue-on-error: true
        run: npm run build

      - name: Clean install from npm registry
        run: |
          mkdir -p /tmp/health-monitor
          cd /tmp/health-monitor
          npm init -y
          npm install stacks-pix-sdk

      - name: Validate package integrity
        continue-on-error: true
        run: |
          cd /tmp/health-monitor
          node -e "
            const sdk = require('stacks-pix-sdk');
            console.log('stacks-pix-sdk health: OK');
            console.log('Exported members:', Object.keys(sdk));
          "

      - name: Check installed version
        continue-on-error: true
        run: |
          cd /tmp/health-monitor
          node -e "
            const meta = require('stacks-pix-sdk/package.json');
            console.log('Version:', meta.version);
            console.log('Description:', meta.description);
          "

      - name: Cleanup
        run: rm -rf /tmp/health-monitor
